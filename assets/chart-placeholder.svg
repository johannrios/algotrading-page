<svg viewBox="0 0 600 380" xmlns="http://www.w3.org/2000/svg" style="background:#0f1729;">
  <defs>
    <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4a0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4a0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Grid lines -->
  <line x1="50" y1="30"  x2="580" y2="30"  stroke="#1e2d4a" stroke-width="1"/>
  <line x1="50" y1="100" x2="580" y2="100" stroke="#1e2d4a" stroke-width="1"/>
  <line x1="50" y1="170" x2="580" y2="170" stroke="#1e2d4a" stroke-width="1"/>
  <line x1="50" y1="240" x2="580" y2="240" stroke="#1e2d4a" stroke-width="1"/>
  <line x1="50" y1="310" x2="580" y2="310" stroke="#1e2d4a" stroke-width="1"/>

  <!-- Area fill under price -->
  <path d="M70,260 L110,220 L150,240 L190,180 L230,200 L270,150 L310,130 L350,110 L390,140 L430,100 L470,80 L510,90 L550,70 L550,310 L70,310 Z" fill="url(#chartGrad)" opacity="0.6"/>

  <!-- Price line -->
  <polyline points="70,260 110,220 150,240 190,180 230,200 270,150 310,130 350,110 390,140 430,100 470,80 510,90 550,70"
    fill="none" stroke="#00d4a0" stroke-width="2" stroke-linejoin="round"/>

  <!-- EMA line -->
  <polyline points="70,265 110,245 150,238 190,210 230,198 270,175 310,155 350,135 390,138 430,120 470,100 510,92 550,80"
    fill="none" stroke="#c8a96e" stroke-width="1.5" stroke-dasharray="6 3" stroke-linejoin="round" opacity="0.8"/>

  <!-- Bollinger Upper -->
  <polyline points="70,280 110,245 150,265 190,200 230,220 270,168 310,148 350,125 390,158 430,115 470,95 510,108 550,85"
    fill="none" stroke="#4a5a78" stroke-width="1" stroke-dasharray="3 3" stroke-linejoin="round"/>

  <!-- Bollinger Lower -->
  <polyline points="70,240 110,198 150,218 190,162 230,178 270,130 310,110 350,95 390,120 430,87 470,62 510,75 550,55"
    fill="none" stroke="#4a5a78" stroke-width="1" stroke-dasharray="3 3" stroke-linejoin="round"/>

  <!-- Buy signal arrows -->
  <polygon points="190,175 183,163 197,163" fill="#00d4a0"/>
  <polygon points="430,95 423,83 437,83" fill="#00d4a0"/>

  <!-- Sell signal -->
  <polygon points="350,115 343,127 357,127" fill="#ff4757"/>

  <!-- Volume bars at bottom -->
  <rect x="60"  y="328" width="12" height="22" rx="1" fill="#00d4a0" opacity="0.4"/>
  <rect x="98"  y="320" width="12" height="30" rx="1" fill="#00d4a0" opacity="0.4"/>
  <rect x="136" y="334" width="12" height="16" rx="1" fill="#ff4757" opacity="0.4"/>
  <rect x="174" y="316" width="12" height="34" rx="1" fill="#00d4a0" opacity="0.6"/>
  <rect x="212" y="330" width="12" height="20" rx="1" fill="#ff4757" opacity="0.4"/>
  <rect x="250" y="310" width="12" height="40" rx="1" fill="#00d4a0" opacity="0.7"/>
  <rect x="288" y="318" width="12" height="32" rx="1" fill="#00d4a0" opacity="0.5"/>
  <rect x="326" y="324" width="12" height="26" rx="1" fill="#ff4757" opacity="0.4"/>
  <rect x="364" y="312" width="12" height="38" rx="1" fill="#00d4a0" opacity="0.6"/>
  <rect x="402" y="305" width="12" height="45" rx="1" fill="#00d4a0" opacity="0.8"/>
  <rect x="440" y="320" width="12" height="30" rx="1" fill="#00d4a0" opacity="0.5"/>
  <rect x="478" y="314" width="12" height="36" rx="1" fill="#ff4757" opacity="0.4"/>
  <rect x="516" y="322" width="12" height="28" rx="1" fill="#00d4a0" opacity="0.5"/>

  <!-- Y-axis labels -->
  <text x="42" y="34"  font-family="JetBrains Mono, monospace" font-size="9" fill="#4a5a78" text-anchor="end">68,500</text>
  <text x="42" y="104" font-family="JetBrains Mono, monospace" font-size="9" fill="#4a5a78" text-anchor="end">67,800</text>
  <text x="42" y="174" font-family="JetBrains Mono, monospace" font-size="9" fill="#4a5a78" text-anchor="end">67,100</text>
  <text x="42" y="244" font-family="JetBrains Mono, monospace" font-size="9" fill="#4a5a78" text-anchor="end">66,400</text>

  <!-- Legend -->
  <line x1="70" y1="358" x2="90" y2="358" stroke="#00d4a0" stroke-width="2"/>
  <text x="94" y="362" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a9ab5">Precio</text>
  <line x1="150" y1="358" x2="170" y2="358" stroke="#c8a96e" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="174" y="362" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a9ab5">EMA-20</text>
  <line x1="240" y1="358" x2="260" y2="358" stroke="#4a5a78" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="264" y="362" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a9ab5">Bollinger</text>
  <polygon points="342,354 338,348 346,348" fill="#00d4a0"/>
  <text x="350" y="362" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a9ab5">BUY signal</text>
  <polygon points="442,358 438,364 446,364" fill="#ff4757"/>
  <text x="450" y="362" font-family="JetBrains Mono, monospace" font-size="9" fill="#8a9ab5">SELL signal</text>
</svg>
